<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leleo的个人主页🎉</title>
    <meta name="description" content="欢迎来到Leleo的奇妙世界！" />
    <meta name="keywords" content="Leleo, leleo, 个人主页, 个人网站" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css" />
</head>
<body>
    <!-- 加载动画 -->
    <div class="loading" id="loadingScreen">
        <div class="spinner"></div>
    </div>

    <!-- 全屏背景 -->
    <div class="fullscreen-bg" id="fullscreenBg">
        <div class="bg-overlay"></div>
        <video class="video-bg" id="videoBg" loop muted playsinline style="display:none;"></video>
    </div>

    <!-- 主内容 -->
    <div class="main-content" id="mainContent" style="visibility:hidden;">
        <div class="app-container">
            <!-- 左侧面板 -->
            <div class="left-panel">
                <!-- 欢迎语 -->
                <div class="welcome-text" id="welcomeText">Hi, I'm Leleo</div>

                <!-- 头像区域 -->
                <div class="avatar-section">
                    <div class="avatar-wrapper" id="avatarWrapper">
                        <img src="img/avatar.jpg" alt="头像" class="avatar-img" id="avatarImg" />
                        <div class="turntable" id="turntable" style="display:none;">
                            <svg viewBox="0 0 200 200" width="200" height="200">
                                <defs>
                                    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                                        <stop offset="0%" style="stop-color:#FFFF00;stop-opacity:1" />
                                        <stop offset="100%" style="stop-color:#00FFFF;stop-opacity:1" />
                                    </linearGradient>
                                </defs>
                                <circle cx="100" cy="100" r="95" fill="none" stroke="url(#grad1)" stroke-width="3" stroke-dasharray="8 6"/>
                                <circle cx="100" cy="100" r="80" fill="none" stroke="url(#grad1)" stroke-width="1.5" stroke-dasharray="4 8"/>
                                <circle cx="100" cy="100" r="65" fill="none" stroke="url(#grad1)" stroke-width="1" stroke-dasharray="2 6"/>
                                <circle cx="100" cy="100" r="30" fill="url(#grad1)" opacity="0.3"/>
                                <circle cx="100" cy="100" r="8" fill="url(#grad1)"/>
                            </svg>
                        </div>
                        <div class="music-player" id="musicPlayer" style="display:none;">
                            <div class="music-info" id="musicInfo">
                                <span class="music-title" id="musicTitle"></span>
                                <span class="music-author" id="musicAuthor"></span>
                            </div>
                            <div class="music-controls">
                                <button class="music-btn" id="prevBtn"><i class="mdi mdi-skip-previous"></i></button>
                                <button class="music-btn" id="playBtn"><i class="mdi mdi-play"></i></button>
                                <button class="music-btn" id="nextBtn"><i class="mdi mdi-skip-next"></i></button>
                            </div>
                            <div class="music-progress">
                                <input type="range" id="musicProgress" min="0" max="100" value="0" />
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 标签 -->
                <div class="tags-section" id="tagsSection">
                    <span class="tag" v-for="tag in tags">乐观开朗</span>
                </div>

                <!-- 社交图标 -->
                <div class="social-icons" id="socialIcons">
                    <a href="https://www.github.com/leleo886" target="_blank" class="social-icon" title="GitHub">
                        <i class="mdi mdi-github"></i>
                    </a>
                    <a href="mailto:leleo886@foxmail.com" class="social-icon" title="邮箱">
                        <i class="mdi mdi-email"></i>
                    </a>
                    <a href="#" class="social-icon" title="QQ">
                        <i class="mdi mdi-qqchat"></i>
                    </a>
                    <a href="#" class="social-icon" title="微信">
                        <i class="mdi mdi-wechat"></i>
                    </a>
                </div>
            </div>

            <!-- 右侧面板 -->
            <div class="right-panel" id="rightPanel">
                <!-- 搜索引擎 -->
                <div class="search-engine">
                    <span class="engine-title">Leleo.top</span>
                    <div class="search-box">
                        <input type="text" placeholder="搜索..." id="searchInput" />
                        <button id="searchBtn"><i class="mdi mdi-magnify"></i></button>
                    </div>
                </div>

                <!-- 时间日期 -->
                <div class="datetime-display">
                    <div class="time-display clock-font" id="timeDisplay">14 : 30 : 05</div>
                    <div class="date-display" id="dateDisplay">2025年01月15日 星期三</div>
                </div>

                <!-- 部署按钮 -->
                <div class="deploy-section">
                    <button class="deploy-btn" id="deployBtn">
                        <i class="mdi mdi-rocket-launch"></i> 部署项目
                    </button>
                </div>

                <!-- 标签页切换 -->
                <div class="tabs-nav" id="tabsNav">
                    <button class="tab-btn active" data-tab="tab1">
                        <i class="mdi mdi-pencil-plus"></i> 样式预览
                    </button>
                    <button class="tab-btn" data-tab="tab2">
                        <i class="mdi mdi-wallpaper"></i> 背景预览
                    </button>
                    <button class="tab-btn" data-tab="tab3">
                        <i class="mdi mdi-music-circle-outline"></i> 音乐播放
                    </button>
                </div>

                <!-- Tab1: 样式预览 - 技能雷达图 -->
                <div class="tab-content active" id="tab1">
                    <h3 class="tab-title">技能雷达图</h3>
                    <div class="chart-container">
                        <canvas id="polarChart"></canvas>
                    </div>
                </div>

                <!-- Tab2: 背景预览 -->
                <div class="tab-content" id="tab2">
                    <h3 class="tab-title">壁纸切换</h3>
                    <div class="wallpaper-grid" id="wallpaperGrid"></div>
                    <p class="tab-hint">不同壁纸在相应设备下响应</p>
                </div>

                <!-- Tab3: 音乐播放器 -->
                <div class="tab-content" id="tab3">
                    <h3 class="tab-title">播放列表</h3>
                    <div class="playlist" id="playlist"></div>
                    <div class="lyrics-display" id="lyricsDisplay" style="display:none;">
                        <p id="currentLyric"></p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 项目卡片 -->
        <div class="projects-section" id="projectsSection">
            <h2 class="section-title">项目作品</h2>
            <div class="projects-grid" id="projectsGrid"></div>
        </div>

        <!-- 页脚 -->
        <footer class="site-footer">
            <p>备案号：XXICP备123456789号</p>
            <p>Copyright © 2025 Leleo</p>
        </footer>
    </div>

    <!-- 隐藏的音频播放器 -->
    <audio id="audioPlayer" preload="none"></audio>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
